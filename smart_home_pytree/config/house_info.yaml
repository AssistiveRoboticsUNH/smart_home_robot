locations:
  bedroom:
    x: 0.5
    y: 1.44
    yaw: 45
  dining:
    x: 0.5
    y: 1.44
    yaw: 45
  home:
    x: 0.5
    y: -1.4
    yaw: 180
  living_room:
    x: 1.94
    y: -0.4
    yaw: -17
person_init: living_room
protocols:
  charge_robot:
    action:
      steps:
      - tree_name: charge_robot
        tree_params:
          num_attempts: 3
    high_level:
      priority: 100
      reset_pattern:
        type: instant
      triggers:
        event:
        - state: charging
          value: false
    runner: GenericProtocol
  coffee:
    action:
      steps:
      - confirmation:
          on_no:
          - tree_name: play_text
            tree_params:
              text: Okay, enjoy your coffee.
          on_yes:
          - tree_name: play_video
            tree_params:
              video_path: /home/olagh48652/Downloads/maggie_coffee.mp4
          question: Would you like me to show you how to make coffee?
    high_level:
      priority: 3
      reset_pattern:
        type: eod
      triggers:
        event:
        - state: coffee
          value: true
    runner: GenericProtocol
  exercise:
    high_level:
      priority: 4
      reset_pattern:
        type: instant
      triggers:
        event:
        - state: start_exercise
          value: true
        time:
          day: []
          from: '15:00'
          to: '17:00'
    low_level:
      exercise_yaml_file: /home/olagh48652/smart_home_pytree_ws/src/smart_home_robot/smart_home_pytree/config/exercise_routine_test.yaml
      get_confirmation: Do you want to exercise now?
      start_state_key: start_exercise
      stop_state_key: stop_exercise
      video_dir_path: /home/olagh48652/Exercise_Videos
    runner: ExerciseProtocol
  exercise_rand:
    high_level:
      priority: 4
      reset_pattern:
        type: instant
      triggers:
        event:
        - state: start_exercise
          value: true
        time:
          day: []
          from: '13:00'
          to: '14:00'
    low_level:
      difficulty_level:
      - low
      - medium
      get_confirmation: Do you want to exercise now?
      reps_per_exercise: 1
      start_state_key: start_exercise
      stop_state_key: stop_exercise
      time_between_exercises: 6
      time_between_reps: 3
      time_limit_minutes: 5
      total_num_exercises: 2
      video_dir_path: /home/olagh48652/Exercise_Videos
    runner: ExerciseRandomProtocol
  medicine_3:
    action:
      steps:
      - next_step_after: 10
        tree_name: play_audio
        tree_params:
          audio_path: /home/olagh48652/smart-home/src/smart-home-robot/shr_resources/resources/food_reminder.mp3
      - confirmation:
          on_no:
          - tree_name: play_text
            tree_params:
              text: Please take your medicines
          on_yes:
          - tree_name: play_text
            tree_params:
              text: Great job
          question: Have you taken your medication yet?
    high_level:
      priority: 2
      reset_pattern:
        type: eod
      success_on:
        state: coffee
        value: true
      triggers:
        permissible_locations:
        - living_room
        time:
          day: []
          from: '10:00'
          to: '12:00'
    runner: GenericProtocol
  medicine_am:
    action:
      steps:
      - next_step_after: 20
        tree_name: play_text
        tree_params:
          execution_location: person
          text: This is a reminder to take your morning medicine
      - confirmation:
          execution_location: person
          on_no:
          - tree_name: play_text
            tree_params:
              text: Please take your medicines
          on_yes:
          - tree_name: play_text
            tree_params:
              text: Great job
          question: Have you taken your medication yet?
    high_level:
      priority: 2
      reset_pattern:
        type: eod
      triggers:
        permissible_locations:
        - living_room
        time:
          day: []
          from: '15:00'
          to: '17:00'
    runner: GenericProtocol
  medicine_pm:
    action:
      steps:
      - next_step_after: 10
        tree_name: play_text
        tree_params:
          text: please take your night medicine
      - confirmation:
          on_no:
          - tree_name: play_text
            tree_params:
              text: Please take your medicines
          on_yes:
          - tree_name: play_text
            tree_params:
              text: Great job
          question: Have you taken your medication yet?
    high_level:
      priority: 2
      reset_pattern:
        type: eod
      success_on:
        state: coffee
        value: true
      triggers:
        permissible_locations:
        - living_room
        time:
          day: []
          from: '18:00'
          to: '22:00'
    runner: GenericProtocol
  move_away:
    action:
      steps:
      - tree_name: move_away
        tree_params:
          away_location: dining
          end_sleep: 5
          position_state_key: position
          state_key: move_away
    high_level:
      priority: 1
      reset_pattern:
        type: instant
      triggers:
        event:
        - state: move_away
          value: true
    runner: GenericProtocol
