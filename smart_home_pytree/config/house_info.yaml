## store infromation needed for all protocols
locations:
  bedroom:
    x: 0.5
    y: 1.44
    yaw: 0.78     # 45 degrees ≈ 0.78 rad
  living_room:
    x: 1.94
    y: -0.4
    yaw: -0.3
  home:
    x: 0.5
    y: -1.4
    yaw: 3.14     # π rad (180 degrees)
  dining:
    x: 0.5
    y: 1.44
    yaw: 0.78



## need to be integerated to have robot interface get its info 
person_location_state: "person_location"
robot_location_state: "robot_location"

# GenericProtocol executable step `tree_name` values are validated by `protocol_schema.py`.
# Supported tree names + allowed `tree_params` are defined in:
# `smart_home_pytree/smart_home_pytree/protocol_schema.py` -> `RUN_TREE_SPECS`
# (Examples used below: play_text, play_audio, play_video, move_away)

###
# `day` is configured inside `high_level.triggers.time`.
# - omit `time.day`, or use `time.day: []`, to allow every day
#
# `high_level.reset_pattern` is optional.
# - if omitted, behavior is equivalent to `type: eod`
#
# Reset pattern types:
#
# 1) `eod` (end of day)
# - Protocol is marked complete and will not retrigger again the same day
# - It becomes eligible again after the daily reset (midnight cycle)
# reset_pattern:
#   type: eod
#
# 2) `instant`
# - Protocol done flags are reset immediately after completion
# - Protocol may retrigger again as soon as trigger conditions remain/are true
# reset_pattern:
#   type: instant
#
# 3) `periodic`
# - Protocol is blocked after completion, then auto-resets after duration
# - At least one of `hours` or `minutes` must be > 0
# reset_pattern:
#   type: periodic
#   hours: 1
#   minutes: 30

###
protocols:
  medicine_am:
    runner: GenericProtocol
    action:
      steps:
        - tree_name: play_text
          tree_params:
            text: "This is a reminder to take your morning medicine"
          wait_after: 10
        - confirmation:
            question: "Have you taken your medication yet?"
            on_yes:
              - tree_name: play_text
                tree_params:
                  text: "Great job"
            on_no:
              - tree_name: play_text
                tree_params:
                  text: "Please take your medicines"
    high_level:
      reset_pattern:
        type: eod
      priority: 2
      triggers:
        time:
          day: []
          from: '15:00'
          to: '17:00'
        permissible_locations: [living_room]

  medicine_pm:
    runner: GenericProtocol
    action:
      steps:
        - tree_name: play_text
          tree_params:
            text: "please take your night medicine"
          wait_after: 10
        - confirmation:
            question: "Have you taken your medication yet?"
            on_yes:
              - tree_name: play_text
                tree_params:
                  text: "Great job"
            on_no:
              - tree_name: play_text
                tree_params:
                  text: "Please take your medicines"
    high_level:
      reset_pattern:
        type: eod
      priority: 2
      success_on: {'state': 'coffee', 'value': True}
      triggers:
        time:
          day: []
          from: '18:00'
          to: '22:00'
        permissible_locations: [living_room]

  medicine_3:
    runner: GenericProtocol
    action:
      steps:
        - tree_name: play_audio
          tree_params:
            audio_path: "/home/olagh48652/smart-home/src/smart-home-robot/shr_resources/resources/food_reminder.mp3"
          wait_after: 10
        - confirmation:
            question: "Have you taken your medication yet?"
            on_yes:
              - tree_name: play_text
                tree_params:
                  text: "Great job"
            on_no:
              - tree_name: play_text
                tree_params:
                  text: "Please take your medicines"
    high_level:
      reset_pattern:
        type: eod
      priority: 2
      success_on: {'state': 'coffee', 'value': True}
      triggers:
        time:
          day: []
          from: '10:00'
          to: '12:00'
        permissible_locations: [living_room]

  coffee:
    runner: GenericProtocol
    action:
      steps:
        - confirmation:
            question: "Would you like me to show you how to make coffee?"
            on_yes:
              - tree_name: play_video
                tree_params:
                  video_path: "/home/olagh48652/Downloads/maggie_coffee.mp4" ## path on the tablet
            on_no:
              - tree_name: play_text
                tree_params:
                  text: "Okay, enjoy your coffee."
    high_level:
      reset_pattern:
        type: eod
      priority: 3
      triggers:
        event:
          - {'state': 'coffee', 'value': True}
        time:
          day: []
          from: '03:00'
          to: '4:00'

  

  charge_robot:
    runner: GenericProtocol
    action:
      steps:
        - tree_name: charge_robot
          tree_params:
            num_attempts: 3
    high_level:
      priority: 100
      reset_pattern:
        type: instant 
      triggers:
        event:
          - {'state': 'charging', 'value': False}

  move_away:
    runner: GenericProtocol
    action:
      steps:
        - tree_name: move_away
          tree_params:
            away_location: dining # move_away has two loc, home or away where away is the location defined here and has to be part of the locations in the yaml
            position_state_key: position # key to indicate whether to move away or home
            state_key: move_away ## in robot interface when move_away is set to true it triggers the protocol
            end_sleep: 5 # tree-local sleep after reaching the target location, before reset
    high_level:
      reset_pattern:
        type: instant 
      priority: 1
      triggers:
        event:
          - {'state': 'move_away', 'value': True}

  exercise:
    runner: ExerciseProtocol
    low_level:
      exercise_yaml_file: "/home/olagh48652/smart_home_pytree_ws/src/smart_home_robot/smart_home_pytree/config/exercise_routine_test.yaml" 
      video_dir_path: "/home/olagh48652/Exercise_Videos" ## path on the tablet 
      start_state_key: "start_exercise"
      stop_state_key: "stop_exercise"
      get_confirmation: "Do you want to exercise now?" ## if empty then dont ask to indicate whether the protocol should start after the person asks
    high_level:
      reset_pattern:
        type: instant ## if triggered should play directly
      priority: 4
      triggers:
        event:
          - {'state': 'start_exercise', 'value': True}
        time:
          day: []
          from: '15:00'
          to: '17:00'

  ## you should have one either random or normal exercise protocol
  exercise_rand:
    runner: ExerciseRandomProtocol
    low_level:
      total_num_exercises: 2 ## total number of exercises to pick from
      difficulty_level: [low, medium] ## difficulty level to pick exercises from [high, medium, low] empty means all levels
      time_limit_minutes: 5 ## time limit for the exercise session
      reps_per_exercise: 1 ## number of repetitions per exercise
      time_between_exercises: 6 ## time between exercises in seconds
      time_between_reps: 3 ## time between reps in seconds
      video_dir_path: "/home/olagh48652/Exercise_Videos" ## path on the tablet 
      start_state_key: "start_exercise"
      stop_state_key: "stop_exercise"
      get_confirmation: "Do you want to exercise now?" ## if empty then dont ask to indicate whether the protocol should start after the person asks
    high_level:
      reset_pattern:
        type: instant ## if triggered should play directly
      priority: 4
      triggers:
        event:
          - {'state': 'start_exercise', 'value': True}
        time:
          day: []
          from: '13:00'
          to: '14:00'
